<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Merge Legion</title>
<!-- PLATFORM_SDK -->
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;margin:0;padding:0}
  html,body{height:100%;background:#0a0e14;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#eef;overflow:hidden;touch-action:none}
  #wrap{position:fixed;inset:0;display:flex;justify-content:center;background:#000}
  #game{position:relative;width:100%;max-width:480px;height:100%;overflow:hidden;background:#0e1420}
  #cv{display:block;width:100%;height:100%;touch-action:none}
  /* overlays */
  .screen{position:absolute;inset:0;background:#0a0e14ee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;padding:22px;text-align:center}
  .screen.hide{display:none}
  .screen h1{font-size:32px;margin-bottom:4px;letter-spacing:1px}
  .screen .sub{font-size:14px;color:#9fb0cc;margin:4px 0 8px;max-width:320px;line-height:1.4}
  .stat{font-size:15px;color:#ffd34d;font-weight:800;margin:3px 0}
  .btn{border:none;border-radius:15px;padding:15px 30px;font-weight:900;font-size:18px;color:#0a0e14;margin-top:12px;min-width:220px;box-shadow:0 5px 0 #0007;cursor:pointer}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0007}
  .btn.go{background:linear-gradient(#7ee06b,#4fb43e)}
  .btn.ghost{background:#243049;color:#9fb0cc;box-shadow:0 5px 0 #0005;font-size:15px;padding:11px 20px;min-width:0}
  .emoji{font-size:50px;margin-bottom:4px}
  /* meta panel */
  #meta .row{display:flex;align-items:center;gap:10px;background:#15203a;border:1px solid #2a3a5c;border-radius:12px;padding:10px 12px;margin:6px 0;width:100%;max-width:360px}
  #meta .row .ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 34px}
  #meta .row .t{flex:1;text-align:left}
  #meta .row .t b{font-size:14px}#meta .row .t span{display:block;font-size:11px;color:#9fb0cc}
  #meta .row button{border:none;border-radius:9px;background:linear-gradient(#5ad1ff,#2b9fd6);color:#04121c;font-weight:800;font-size:12px;padding:8px 10px;min-width:72px}
  #meta .row button:disabled{background:#243049;color:#5a6a86}
  #medals{font-size:16px;font-weight:900;color:#7fd0ff;margin:6px 0}
  #toast{position:absolute;left:50%;top:16%;transform:translateX(-50%);background:#15203aee;border:1px solid #ffd34d;color:#ffd34d;font-weight:800;padding:8px 15px;border-radius:11px;font-size:13px;opacity:0;transition:opacity .25s;z-index:40;pointer-events:none;text-align:center;max-width:86%}
  #toast.show{opacity:1}
  #muteBtn{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:8px;background:#0008;border:1px solid #ffffff22;color:#cde;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:6}
</style>
</head>
<body>
<div id="wrap"><div id="game">
  <canvas id="cv"></canvas>
  <div id="muteBtn">&#9835;</div>
  <div id="toast"></div>

  <div class="screen" id="startScreen">
    <div class="emoji">&#9876;&#65039;</div>
    <h1 style="color:#ffd34d">MERGE LEGION</h1>
    <div class="sub"><b>Summon</b> cannons, <b>drag two of the same</b> together to merge into a stronger one. They auto-fight the waves. Survive as long as you can.</div>
    <button class="btn go" id="startBtn">DEPLOY</button>
    <button class="btn ghost" id="metaBtn">War Council (upgrades)</button>
  </div>

  <div class="screen hide" id="meta">
    <h1 style="font-size:24px;color:#7fd0ff">WAR COUNCIL</h1>
    <div class="sub">Spend Medals (earned every run) on permanent upgrades. They carry into every future run.</div>
    <div id="medals">&#127942; 0 Medals</div>
    <div id="metaRows"></div>
    <button class="btn ghost" id="metaBack">back</button>
  </div>

  <div class="screen hide" id="overScreen">
    <div class="emoji">&#128128;</div>
    <h1 style="color:#ff6b6b">OVERRUN!</h1>
    <div class="sub" id="overSub">The legion fell.</div>
    <div class="stat" id="overStat"></div>
    <div class="stat" id="overMedals" style="color:#7fd0ff"></div>
    <button class="btn go" id="retryBtn">DEPLOY AGAIN</button>
    <button class="btn ghost" id="overMetaBtn">spend medals</button>
  </div>
</div></div>
<script>
"use strict";
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rand=(a,b)=>a+Math.random()*(b-a);

// ---- BALANCE (geometric merge curve + escalating waves) -------------------
const COLS=5, ROWS=4, MAXTIER=8;
const TIER_DMG=[0,5,11,24,53,116,255,560,1230];          // ~x2.2 per tier (merge 2 -> 1 is a net power gain)
const TIER_COLOR=['','#8794a8','#5ad1ff','#7ee06b','#ffd34d','#ff9d3c','#ff6b6b','#b07fff','#ff7edd'];
const TIER_NAME=['','Pop Gun','Twin Gun','Cannon','Heavy Cannon','Mortar','Siege Gun','Plasma','LEGION GUN'];
const FIRE_CD=0.62;                                       // seconds between shots (all tiers; dmg scales)
const SUMMON_BASE=12, SUMMON_GROWTH=4;                    // cost rises per summon within a run
const ENEMY_HP=w=>Math.floor(18*Math.pow(1.26,w-1));
const ENEMY_COUNT=w=>4+Math.floor(w*1.4);
const ENEMY_SPEED=w=>26+w*1.1;                            // px/sec downward
const COIN_PER_KILL=w=>2+Math.floor(w*0.7);
const WAVE_BONUS=w=>15+w*6;
const SPAWN_GAP=w=>clamp(0.85-w*0.02,0.28,0.85);         // sec between spawns in a wave

// permanent META upgrades (Medals)
const UPGRADES=[
  {id:'base', ic:'&#128737;', name:'Reinforced Wall', desc:'+4 Wall HP / lvl',     base:2, step:2, max:20, val:l=>l*4},
  {id:'coin', ic:'&#128176;', name:'War Chest',       desc:'+12 start coins / lvl', base:2, step:2, max:20, val:l=>l*12},
  {id:'dmg',  ic:'&#128293;', name:'Sharper Rounds',  desc:'+7% all damage / lvl',  base:3, step:3, max:25, val:l=>1+l*0.07},
  {id:'cost', ic:'&#9889;',   name:'Rapid Muster',    desc:'-4% summon cost / lvl',  base:3, step:3, max:15, val:l=>Math.pow(0.96,l)},
];
const SAVE='mergeLegion_v1';

// ---- state ----
const cv=$("#cv"), cx=cv.getContext("2d"); let SW=0,SH=0,DPR=1;
let state="menu";                 // menu | play | over | meta
let grid, enemies, shots, parts, coins, baseHP, baseMax, wave, waveLeft, spawnT, summons, betweenT, medals, upg, muted=false, shakeT=0, hitFlash=0;
let drag=null;                    // {tier, from:{c,r}, x,y}
let geo={};                       // layout geometry

function resize(){const r=cv.getBoundingClientRect();DPR=Math.min(2,devicePixelRatio||1);cv.width=r.width*DPR;cv.height=r.height*DPR;cx.setTransform(DPR,0,0,DPR,0,0);SW=r.width;SH=r.height;computeGeo();}
addEventListener("resize",resize);
function computeGeo(){
  const pad=10, top=64;
  const gridH=SH*0.42, gridW=SW-pad*2;
  geo.cellW=gridW/COLS; geo.cellH=gridH/ROWS;
  geo.gridX=pad; geo.gridY=SH-gridH-72;       // grid sits above the summon bar
  geo.line=geo.gridY;                          // defense line = top of grid
  geo.fieldTop=top;
  geo.barY=SH-66;
}

function loadSave(){try{const r=JSON.parse(localStorage.getItem(SAVE));if(r){medals=r.medals||0;upg=Object.assign({base:0,coin:0,dmg:0,cost:0},r.upg||{});muted=!!r.muted;return;}}catch(e){} medals=0; upg={base:0,coin:0,dmg:0,cost:0};}
function persist(){try{localStorage.setItem(SAVE,JSON.stringify({medals,upg,muted}));}catch(e){}}

// ---- start a run ----
function startRun(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  enemies=[]; shots=[]; parts=[];
  coins=20+UPGRADES.find(u=>u.id==='coin').val(upg.coin);
  baseMax=20+UPGRADES.find(u=>u.id==='base').val(upg.base); baseHP=baseMax;
  wave=0; summons=0; betweenT=0; spawnT=0; waveLeft=0;
  drag=null; state="play"; hideScreens();
  // start with 2 free units so the board isn't empty
  placeUnit(1); placeUnit(1);
  nextWave();
}
function dmgMul(){return UPGRADES.find(u=>u.id==='dmg').val(upg.dmg);}
function summonCost(){return Math.ceil((SUMMON_BASE+summons*SUMMON_GROWTH)*UPGRADES.find(u=>u.id==='cost').val(upg.cost));}

function emptyCells(){const o=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!grid[r][c])o.push([r,c]);return o;}
function placeUnit(tier){const e=emptyCells();if(!e.length)return false;const[r,c]=e[(Math.random()*e.length)|0];grid[r][c]={tier,cd:Math.random()*FIRE_CD,pop:0};return true;}

// ---- waves ----
function nextWave(){ wave++; waveLeft=ENEMY_COUNT(wave); spawnT=0; toast("WAVE "+wave); beep(300,.1,"square"); if(wave>1){coins+=WAVE_BONUS(wave-1);} }
function spawnEnemy(){
  const lane=(Math.random()*COLS)|0;
  const x=geo.gridX+lane*geo.cellW+geo.cellW/2;
  let type='grunt';
  if(wave>=4 && Math.random()<0.22) type='runner';
  if(wave>=7 && Math.random()<0.18) type='brute';
  let hp=ENEMY_HP(wave), sp=ENEMY_SPEED(wave), rd=15, dmg=2, col='#7ee06b';
  if(type==='runner'){hp*=0.55;sp*=1.9;rd=12;dmg=1;col='#5ad1ff';}
  if(type==='brute'){hp*=3.2;sp*=0.62;rd=21;dmg=4;col='#ff6b6b';}
  enemies.push({x,y:geo.fieldTop-10,hp,maxhp:hp,sp,r:rd,dmg,col,type,wob:Math.random()*6});
}

// ---- input (drag to merge) ----
function cellAt(x,y){const c=Math.floor((x-geo.gridX)/geo.cellW),r=Math.floor((y-geo.gridY)/geo.cellH);if(c<0||c>=COLS||r<0||r>=ROWS)return null;return[r,c];}
function px(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
cv.addEventListener("pointerdown",e=>{ if(audio&&audio.state==="suspended")audio.resume(); startMusic();
  if(state!=="play")return; const p=px(e); const cell=cellAt(p.x,p.y);
  if(cell&&grid[cell[0]][cell[1]]){ const u=grid[cell[0]][cell[1]]; drag={tier:u.tier,from:cell,x:p.x,y:p.y}; }
});
cv.addEventListener("pointermove",e=>{ if(drag){const p=px(e);drag.x=p.x;drag.y=p.y;} });
cv.addEventListener("pointerup",e=>{ if(!drag)return; const p=px(e); const cell=cellAt(p.x,p.y); const[fr,fc]=drag.from;
  if(cell){ const[tr,tc]=cell;
    if(tr===fr&&tc===fc){ /* dropped back */ }
    else { const tgt=grid[tr][tc];
      if(!tgt){ grid[tr][tc]=grid[fr][fc]; grid[fr][fc]=null; }
      else if(tgt.tier===drag.tier && tgt.tier<MAXTIER){ // MERGE
        grid[tr][tc]={tier:tgt.tier+1,cd:0,pop:1}; grid[fr][fc]=null;
        burst(cellCx(tc),cellCy(tr),TIER_COLOR[tgt.tier+1],16); shake(180);
        beep(420+tgt.tier*70,.09); if(tgt.tier+1===MAXTIER)toast("LEGION GUN!");
      }
      else { /* swap different tiers */ const tmp=grid[tr][tc]; grid[tr][tc]=grid[fr][fc]; grid[fr][fc]=tmp; }
    }
  }
  drag=null;
});
function cellCx(c){return geo.gridX+c*geo.cellW+geo.cellW/2;}
function cellCy(r){return geo.gridY+r*geo.cellH+geo.cellH/2;}

// ---- summon (tap bottom bar) ----
function trySummon(){ const cost=summonCost(); if(coins<cost){toast("Need "+cost+" coins");beep(140,.1,"square");return;} if(!emptyCells().length){toast("Board full - merge first!");return;} coins-=cost; summons++; placeUnit(1); beep(520,.05); }

// ---- update ----
function update(dt){
  // spawn within wave
  if(waveLeft>0){ spawnT-=dt; if(spawnT<=0){ spawnEnemy(); waveLeft--; spawnT=SPAWN_GAP(wave); } }
  // between-wave check
  if(waveLeft<=0 && enemies.length===0){ betweenT-=dt; if(betweenT<=0){ nextWave(); betweenT=1.2; } }

  // units fire
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const u=grid[r][c]; if(!u)continue; u.pop=Math.max(0,(u.pop||0)-dt*3);
    u.cd-=dt; if(u.cd<=0){ const tgt=nearestEnemy(cellCx(c),cellCy(r)); if(tgt){ u.cd=FIRE_CD;
      shots.push({x:cellCx(c),y:cellCy(r)-geo.cellH*0.3,tx:tgt,dmg:TIER_DMG[u.tier]*dmgMul(),col:TIER_COLOR[u.tier],trail:0});
      u.recoil=1;
    } }
    if(u.recoil)u.recoil=Math.max(0,u.recoil-dt*6);
  }
  // shots
  for(let i=shots.length-1;i>=0;i--){ const s=shots[i]; const t=s.tx;
    if(!t||t.dead){ shots.splice(i,1); continue; }
    const dx=t.x-s.x,dy=t.y-s.y,d=Math.hypot(dx,dy)||1, sp=620*dt;
    if(d<=sp+t.r){ // hit
      t.hp-=s.dmg; burst(t.x,t.y,s.col,5);
      if(t.hp<=0){ killEnemy(t); }
      shots.splice(i,1);
    } else { s.x+=dx/d*sp; s.y+=dy/d*sp; }
  }
  // enemies march
  for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; e.wob+=dt*5; e.y+=e.sp*dt;
    if(e.y>=geo.line){ baseHP-=e.dmg; hitFlash=1; shake(220); beep(120,.12,"sawtooth"); enemies.splice(i,1);
      if(baseHP<=0){ gameOver(); return; } }
  }
  // particles
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  hitFlash=Math.max(0,hitFlash-dt*2.5);
}
function nearestEnemy(x,y){let best=null,bd=1e9;for(const e of enemies){if(e.dead)continue;const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}return best;}
function killEnemy(e){ e.dead=true; const idx=enemies.indexOf(e); if(idx>=0)enemies.splice(idx,1); const c=COIN_PER_KILL(wave); coins+=c; burst(e.x,e.y,e.col,12); beep(660,.04); }

function gameOver(){ state="over"; const reached=wave; const earned=Math.max(1,Math.floor(reached*1.5)); medals+=earned; persist();
  $("#overSub").textContent="You held "+reached+" wave"+(reached===1?"":"s")+".";
  $("#overStat").textContent="Best gun: "+bestTierName();
  $("#overMedals").innerHTML="&#127942; +"+earned+" Medals  (total "+medals+")";
  beep(180,.25,"sawtooth"); showScreen("overScreen");
}
function bestTierName(){let m=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c])m=Math.max(m,grid[r][c].tier);return TIER_NAME[m]||'-';}

// ---- fx ----
function burst(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=rand(40,200);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.25,.6),col,sz:rand(2,4.5)});}}
function shake(ms){shakeT=Math.max(shakeT, (performance.now?performance.now():0)+ms);}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1500);}

// ---- audio (SFX + looping music) ----
let audio=null;
function beep(f,d,type){if(muted)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type=type||"triangle";o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+(d||.08));o.stop(audio.currentTime+(d||.08)+.02);}catch(e){}}
let mTimer=null,mStep=0; const MROOT=[0,0,-3,-5], MEL=[0,7,5,3,7,12,10,7];
function mNote(f,d,t,v,w){try{const o=audio.createOscillator(),g=audio.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(audio.destination);g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(.0001,w+d);o.start(w);o.stop(w+d+.03);}catch(e){}}
function musicTick(){if(muted||!audio||audio.state!=="running")return;const t=audio.currentTime+0.03;mNote(98*Math.pow(2,MROOT[(mStep>>2)%MROOT.length]/12),0.28,"triangle",0.05,t);if(mStep%2===0)mNote(196*Math.pow(2,(MEL[mStep%MEL.length]+((mStep>>3)%2?12:0))/12),0.14,"square",0.02,t);mStep++;}
function startMusic(){if(mTimer)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();}catch(e){}mTimer=setInterval(musicTick,235);}
document.addEventListener("visibilitychange",()=>{try{if(!audio)return;if(document.hidden)audio.suspend();else if(!muted)audio.resume();}catch(e){}});

// ---- render ----
function drawUnit(x,y,tier,scale){
  const s=geo.cellW*0.34*(scale||1); cx.save(); cx.translate(x,y);
  cx.fillStyle="rgba(0,0,0,.3)"; cx.beginPath(); cx.ellipse(0,s*0.9,s*0.9,s*0.3,0,0,6.28); cx.fill();
  // body
  cx.fillStyle=TIER_COLOR[tier]; roundRect(-s,-s*0.7,s*2,s*1.5,6); cx.fill();
  cx.fillStyle="rgba(255,255,255,.18)"; roundRect(-s,-s*0.7,s*2,s*0.4,6); cx.fill();
  // barrels = tier count (capped)
  const barrels=Math.min(tier,4); cx.fillStyle="#1b2333";
  for(let b=0;b<barrels;b++){ const bx=-s*0.6+ b*(s*1.2/Math.max(1,barrels-1||1)); cx.fillRect(bx-2,-s*1.25,4,s*0.7); }
  // tier number
  cx.fillStyle="#0a0e14"; cx.font="bold "+(s*0.9)+"px sans-serif"; cx.textAlign="center"; cx.textBaseline="middle"; cx.fillText(tier,0,s*0.1);
  cx.restore();
}
function roundRect(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath();}
function render(){
  let ox=0,oy=0; const nowp=performance.now?performance.now():0; if(nowp<shakeT){ox=(Math.random()-.5)*5;oy=(Math.random()-.5)*5;}
  cx.save(); cx.translate(ox,oy);
  // bg
  let bg=cx.createLinearGradient(0,0,0,SH);bg.addColorStop(0,"#16203a");bg.addColorStop(0.55,"#0e1622");bg.addColorStop(1,"#0a0e14");cx.fillStyle=bg;cx.fillRect(-6,-6,SW+12,SH+12);
  if(state!=="play"&&state!=="over"){cx.restore();return;}
  // battlefield lanes
  for(let c=0;c<=COLS;c++){cx.strokeStyle="rgba(255,255,255,.04)";cx.beginPath();cx.moveTo(geo.gridX+c*geo.cellW,geo.fieldTop);cx.lineTo(geo.gridX+c*geo.cellW,geo.line);cx.stroke();}
  // defense line
  cx.strokeStyle="#ffd34d55";cx.lineWidth=3;cx.setLineDash([10,7]);cx.beginPath();cx.moveTo(geo.gridX,geo.line);cx.lineTo(geo.gridX+geo.cellW*COLS,geo.line);cx.stroke();cx.setLineDash([]);cx.lineWidth=1;
  // enemies
  enemies.forEach(e=>{ const wob=Math.sin(e.wob)*e.r*0.08;
    cx.fillStyle="rgba(0,0,0,.3)";cx.beginPath();cx.ellipse(e.x,e.y+e.r*0.8,e.r*0.8,e.r*0.3,0,0,6.28);cx.fill();
    cx.fillStyle=e.col;cx.beginPath();cx.arc(e.x,e.y,e.r+wob,0,6.28);cx.fill();
    cx.fillStyle="rgba(255,255,255,.25)";cx.beginPath();cx.arc(e.x-e.r*0.3,e.y-e.r*0.3,e.r*0.35,0,6.28);cx.fill();
    cx.fillStyle="#0a0e14";cx.beginPath();cx.arc(e.x-e.r*0.3,e.y-e.r*0.1,e.r*0.13,0,6.28);cx.arc(e.x+e.r*0.3,e.y-e.r*0.1,e.r*0.13,0,6.28);cx.fill();
    // hp bar
    if(e.hp<e.maxhp){cx.fillStyle="#0008";cx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,4);cx.fillStyle="#7ee06b";cx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*clamp(e.hp/e.maxhp,0,1),4);}
  });
  // grid cells + units
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const x=geo.gridX+c*geo.cellW, y=geo.gridY+r*geo.cellH;
    cx.fillStyle=(r+c)%2?"rgba(255,255,255,.025)":"rgba(255,255,255,.05)"; roundRect(x+2,y+2,geo.cellW-4,geo.cellH-4,7); cx.fill();
    const u=grid[r][c]; if(u && !(drag&&drag.from[0]===r&&drag.from[1]===c)){ const rec=u.recoil||0; drawUnit(cellCx(c),cellCy(r)-geo.cellH*0.06+rec*4,u.tier,1+(u.pop||0)*0.25); }
    // highlight valid merge target while dragging
    if(drag){ const u2=grid[r][c]; if(u2&&u2.tier===drag.tier&&!(drag.from[0]===r&&drag.from[1]===c)){ cx.strokeStyle="#7ee06b";cx.lineWidth=3;roundRect(x+2,y+2,geo.cellW-4,geo.cellH-4,7);cx.stroke();cx.lineWidth=1; } }
  }
  // shots
  shots.forEach(s=>{cx.fillStyle=s.col;cx.beginPath();cx.arc(s.x,s.y,4,0,6.28);cx.fill();cx.globalAlpha=.4;cx.beginPath();cx.arc(s.x,s.y+5,3,0,6.28);cx.fill();cx.globalAlpha=1;});
  // dragged unit on top
  if(drag){ drawUnit(drag.x,drag.y,drag.tier,1.15); }
  // particles
  parts.forEach(p=>{cx.globalAlpha=clamp(p.life*2.5,0,1);cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,6.28);cx.fill();cx.globalAlpha=1;});
  // base-hit flash
  if(hitFlash>0){cx.fillStyle="rgba(255,60,60,"+(hitFlash*0.35)+")";cx.fillRect(0,0,SW,SH);}
  cx.restore();
  drawHUD();
}
function drawHUD(){
  // top bar
  cx.fillStyle="#0e1622cc";cx.fillRect(0,0,SW,56);
  cx.textBaseline="middle";
  cx.fillStyle="#ffd34d";cx.font="bold 16px sans-serif";cx.textAlign="left";cx.fillText("◈ "+coins,12,20);
  cx.fillStyle="#9fb0cc";cx.font="bold 13px sans-serif";cx.fillText("Wave "+wave,12,40);
  // wall hp
  cx.textAlign="right";cx.fillStyle="#ff8a8a";cx.font="bold 15px sans-serif";cx.fillText("Wall "+Math.max(0,Math.ceil(baseHP))+"/"+baseMax,SW-50,20);
  cx.fillStyle="#0006";cx.fillRect(SW-150,32,100,7);cx.fillStyle="#ff6b6b";cx.fillRect(SW-150,32,100*clamp(baseHP/baseMax,0,1),7);
  // summon bar (bottom)
  const cost=summonCost(); const can=coins>=cost;
  cx.fillStyle=can?"#2b9fd6":"#243049"; roundRect(12,geo.barY,SW-24,52,12); cx.fill();
  cx.fillStyle=can?"#fff":"#5a6a86";cx.font="bold 17px sans-serif";cx.textAlign="center";cx.textBaseline="middle";
  cx.fillText("SUMMON  ◈"+cost,SW/2,geo.barY+26);
}

// ---- loop ----
let last=performance.now?performance.now():0;
function frame(t){const dt=Math.min(.05,(t-last)/1000);last=t;if(state==="play")update(dt);render();requestAnimationFrame(frame);}

// summon via tapping the bottom bar (outside grid)
cv.addEventListener("pointerdown",e=>{ if(state!=="play")return; const p=px(e); if(p.y>=geo.barY && p.y<=geo.barY+52){ trySummon(); } });

// ---- screens + meta ----
function hideScreens(){["startScreen","meta","overScreen"].forEach(id=>$("#"+id).classList.add("hide"));}
function showScreen(id){hideScreens();$("#"+id).classList.remove("hide"); if(id==="meta")renderMeta();}
function renderMeta(){ $("#medals").innerHTML="&#127942; "+medals+" Medals";
  const box=$("#metaRows"); box.innerHTML="";
  UPGRADES.forEach(u=>{ const lvl=upg[u.id]||0, maxed=lvl>=u.max, cost=u.base+u.step*lvl;
    const row=document.createElement("div"); row.className="row";
    row.innerHTML=`<div class="ic" style="background:#1b2740">${u.ic}</div><div class="t"><b>${u.name}</b><span>${u.desc} &middot; Lv ${lvl}</span></div><button></button>`;
    const b=row.querySelector("button");
    if(maxed){b.textContent="MAX";b.disabled=true;} else {b.innerHTML="&#127942; "+cost;b.disabled=medals<cost; b.onclick=()=>{ if(medals<cost)return; medals-=cost; upg[u.id]=lvl+1; persist(); renderMeta(); beep(700,.08); };}
    box.appendChild(row);
  });
}

$("#startBtn").onclick=startRun;
$("#retryBtn").onclick=startRun;
$("#metaBtn").onclick=()=>showScreen("meta");
$("#overMetaBtn").onclick=()=>showScreen("meta");
$("#metaBack").onclick=()=>showScreen(state==="over"?"overScreen":"startScreen");
$("#muteBtn").onclick=()=>{muted=!muted;$("#muteBtn").style.opacity=muted?.4:1;persist();};

// ---- boot ----
loadSave(); resize();
$("#muteBtn").style.opacity=muted?.4:1;
state="menu"; showScreen("startScreen");
requestAnimationFrame(frame);
if(location.search.includes("dev")) window.__ml={get state(){return state},get coins(){return coins},get wave(){return wave},get baseHP(){return baseHP},grid:()=>grid,enemies:()=>enemies,start:startRun,give:n=>{coins+=n;},setHP:n=>{baseHP=n;},merge:(fr,fc,tr,tc)=>{const u=grid[fr][fc];if(u&&grid[tr][tc]&&grid[tr][tc].tier===u.tier){grid[tr][tc]={tier:u.tier+1,cd:0,pop:1};grid[fr][fc]=null;}},summon:trySummon,skipTo:w=>{wave=w-1;enemies=[];waveLeft=0;betweenT=0;},cell:(r,c)=>({x:cellCx(c),y:cellCy(r)}),get medals(){return medals;},addMedals:n=>{medals+=n;persist();},lose:()=>gameOver()};
</script>
