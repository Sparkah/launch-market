<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Launch Market // play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090a; --green:#39ff7a; --green-mid:#2aa564; --green-dim:#1f6b3e; --amber:#ffb347; --blue:#7fd4ff; --ink:#f1f4e7;
  --line:rgba(57,255,122,.28); --line2:rgba(57,255,122,.55);
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0d0a;color:var(--ink);font-family:var(--mono);display:grid;place-items:center;
  background-image:radial-gradient(900px 500px at 50% -10%,rgba(57,255,122,.08),transparent)}
.phone{position:relative;width:min(430px,100vw);height:min(900px,100vh);background:var(--bg);overflow:hidden;
  border:1px solid var(--line);border-radius:26px;box-shadow:0 30px 90px -30px rgba(0,0,0,.9),0 0 0 1px rgba(0,0,0,.6)}
@media(max-width:460px){.phone{border:none;border-radius:0;width:100vw;height:100vh}}

.top{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:linear-gradient(rgba(7,9,10,.9),transparent)}
.brand{font-weight:800;font-size:15px;text-shadow:0 0 8px rgba(57,255,122,.5);color:var(--green)}
.brand .sl{color:var(--green-mid)}
.topr{display:flex;align-items:center;gap:9px}
.moons{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--amber);
  border:1px solid rgba(255,179,71,.4);border-radius:999px;padding:5px 11px;background:rgba(0,0,0,.3)}
.signin{font-family:var(--mono);font-weight:700;font-size:12.5px;color:#04130a;background:var(--green);border:none;
  border-radius:999px;padding:7px 13px;cursor:pointer;box-shadow:0 0 16px rgba(57,255,122,.4)}
.signin:active{transform:translateY(1px)}
.addr{display:none;align-items:center;gap:7px;font-size:12px;color:var(--green);border:1px solid var(--line2);border-radius:999px;padding:6px 11px;background:rgba(0,0,0,.35)}
.addr.show{display:inline-flex}
.addr.demo{color:var(--amber);border-color:rgba(255,179,71,.45)}
.addr .dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

.feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.card{position:relative;height:100%;scroll-snap-align:start;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card .scrim{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(6,8,5,.55) 70%,rgba(6,8,5,.95))}
.meta{position:relative;z-index:2;padding:0 18px 30px}
.meta .gen{font-size:11px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.meta h2{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.05}
.meta p{color:#cfd6c4;font-size:14px;margin-top:8px;max-width:80%}
.meta .real{display:inline-block;margin-top:10px;font-size:11px;color:var(--green);border:1px solid var(--line);border-radius:6px;padding:3px 9px}
.play{margin-top:16px;display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:800;font-size:16px;
  color:#04130a;background:var(--green);border:none;border-radius:12px;padding:13px 24px;cursor:pointer;box-shadow:0 0 26px rgba(57,255,122,.5)}
.play:active{transform:translateY(1px)}
.rail{position:absolute;right:14px;bottom:130px;z-index:2;display:flex;flex-direction:column;gap:18px;align-items:center}
.rb{display:flex;flex-direction:column;align-items:center;gap:4px;color:#eef;font-size:11px;cursor:pointer}
.rb .ic{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.35);display:grid;place-items:center;font-size:20px}
.rb.on .ic{color:var(--green);border-color:var(--line2);box-shadow:0 0 14px rgba(57,255,122,.4)}

/* real game iframe overlay */
.gameover{position:absolute;inset:0;z-index:60;background:#000;display:none;flex-direction:column}
.gameover.show{display:flex}
.gbar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0a0d0a;border-bottom:1px solid var(--line);z-index:2}
.gback{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--green);background:transparent;border:1px solid var(--line2);border-radius:8px;padding:7px 13px;cursor:pointer}
.gback:active{transform:translateY(1px)}
.gtitle{font-size:14px;font-weight:700}
.gtitle small{color:var(--green-mid);font-weight:400}
#gframe{flex:1;width:100%;border:0;background:#000}

.toast{position:absolute;left:14px;right:14px;bottom:24px;z-index:50;background:#0c130b;border:1px solid var(--line2);border-radius:14px;
  padding:15px 17px;box-shadow:0 0 30px rgba(57,255,122,.25);transform:translateY(160%);transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.toast.show{transform:none}
.toast .big{font-size:16px;font-weight:800;color:var(--green)}
.toast .sub{font-size:12.5px;color:var(--green-mid);margin-top:5px;line-height:1.5}
.toast .sub b{color:var(--ink)}

.make{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;z-index:25;font-family:var(--mono);font-weight:700;font-size:12.5px;
  color:var(--green);background:rgba(7,9,10,.7);border:1px solid var(--line2);border-radius:999px;padding:9px 16px;cursor:pointer;backdrop-filter:blur(6px);text-decoration:none;display:none}
.make.show{display:inline-block}
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <span class="brand">launch_market<span class="sl"> // </span>play</span>
    <span class="topr">
      <span class="moons">&#9670; <span id="moonN">0</span></span>
      <button class="signin" id="signin">sign in with Google</button>
      <span class="addr" id="addr"><span class="dot"></span><span id="addrTxt">0x..</span></span>
    </span>
  </div>

  <div class="feed" id="feed"></div>

  <div class="gameover" id="gameover">
    <div class="gbar">
      <button class="gback" id="gback">&#8249; back</button>
      <span class="gtitle" id="gtitle"></span>
    </div>
    <iframe id="gframe" title="game" allow="autoplay; fullscreen"></iframe>
  </div>

  <div class="toast" id="toast">
    <div class="big" id="toastBig"></div>
    <div class="sub" id="toastSub"></div>
  </div>

  <a class="make show" id="make" href="creation.html">+ make your own</a>
</div>

<script type="module">
const ENOKI_PUBLIC_KEY = 'enoki_public_70f43415c8b95e8a9fd899c3c7cb3da6';
const GOOGLE_CLIENT_ID  = '928006945966-16dc76g3d64tak3p9237raajdn69av12.apps.googleusercontent.com';
const REGISTRY = '0x184302c635f558959028a312de16dfeccf099a07a8283d5da9ea0bb6cb9039df';

// Real, embedded factory games (served locally with the gallery sdk.js).
const THUMBS = 'https://game-factory.tech/thumbs';
const FEED = [
  {s:'merge_guns',    t:'Merge Guns',    g:'merge shooter', h:'Merge guns, melt the swarm.'},
  {s:'merge_legion',  t:'Battle Merge',  g:'merge battle',  h:'Merge your army, hold the line.', img:'games/merge_legion/thumb.png'},
  {s:'bandlings',     t:'Bandlings',     g:'merge',          h:'Merge monsters, grow the song.'},
  {s:'brainrot_2048', t:'2048 Brainrot', g:'puzzle',        h:'Slide and merge all the way to 2048.'},
];

const $ = s => document.querySelector(s);
let moons = 0, signedIn = false, address = null, plays = 0, current = null;

$('#feed').innerHTML = FEED.map((c,i)=>`
  <section class="card">
    <img src="${c.img||THUMBS+'/'+c.s+'.png'}" alt="">
    <div class="scrim"></div>
    <div class="rail">
      <div class="rb on" data-like="${i}"><div class="ic">&#9650;</div><span>back</span></div>
      <div class="rb"><div class="ic">&#9670;</div><span>earn</span></div>
    </div>
    <div class="meta">
      <div class="gen">${c.g}</div>
      <h2>${c.t}</h2>
      <p>${c.h}</p>
      <div class="real">real factory game</div>
      <div><button class="play" data-i="${i}">&#9654; Play</button></div>
    </div>
  </section>`).join('');

const setMoons = n => { moons=n; $('#moonN').textContent=n; };
const trunc = a => a.slice(0,6)+'..'+a.slice(-4);
let toastT;
function toast(big, sub){
  $('#toastBig').innerHTML=big; $('#toastSub').innerHTML=sub;
  $('#toast').classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=> $('#toast').classList.remove('show'), 4600);
}

function play(i){
  current = FEED[i];
  $('#gtitle').innerHTML = current.t + ' <small>&middot; live</small>';
  $('#gframe').src = 'games/'+current.s+'/index.html';
  $('#gameover').classList.add('show');
}
function exitGame(){
  $('#gameover').classList.remove('show');
  $('#gframe').src = 'about:blank';
  if(!current) return;
  plays++;
  const earned = 8 + (current.t.length*3)%9;
  setMoons(moons + earned);
  $('#make').classList.add('show');
  if(signedIn){
    toast(`+${earned} Moons earned`, `Anchored to <b>${trunc(address)}</b> on Sui. You own this run. No wallet, no gas.`);
  } else {
    toast(`+${earned} Moons earned`, `Sign in with Google to keep your Moons and <b>own your games on Sui</b>. No wallet needed.`);
  }
  current = null;
}

document.addEventListener('click', e=>{
  const p=e.target.closest('.play'); if(p){ play(+p.dataset.i); return; }
  const l=e.target.closest('.rb[data-like]'); if(l){ l.classList.toggle('on'); }
});
$('#gback').addEventListener('click', exitGame);

function setSignedIn(addr, demo){
  signedIn=true; address=addr;
  $('#signin').style.display='none';
  $('#addrTxt').textContent = trunc(addr) + (demo?' (demo)':'');
  $('#addr').classList.add('show'); if(demo) $('#addr').classList.add('demo');
  if(demo){
    toast(`Demo session`, `Real Google sign-in did not complete, showing a demo address. The live zkLogin path is wired and works when the OAuth round-trips.`);
  } else {
    toast(`You're on Sui.`, `Signed in with Google &rarr; <b>${trunc(addr)}</b>. Your ${moons} Moons and your games are yours now. No seed phrase, no wallet.`);
  }
}

// ---- real zkLogin via Enoki, honest demo fallback ----
let flow=null;
async function enoki(){ if(flow) return flow; const m=await import('https://esm.sh/@mysten/enoki'); flow=new (m.EnokiFlow||m.default)({apiKey:ENOKI_PUBLIC_KEY}); return flow; }
async function addrFromFlow(f){
  try{ const s=await f.getSession?.(); if(s?.address) return s.address; }catch(e){}
  try{ const kp=await f.getKeypair({network:'testnet'}); if(kp?.toSuiAddress) return kp.toSuiAddress(); }catch(e){}
  return null;
}
$('#signin').addEventListener('click', async ()=>{
  try{
    const f=await enoki();
    const url=await f.createAuthorizationURL({ provider:'google', clientId:GOOGLE_CLIENT_ID,
      redirectUrl: location.origin+location.pathname, network:'testnet' });
    location.href=url;
  }catch(e){ console.warn('enoki sign-in failed, demo fallback:', e); setSignedIn(REGISTRY, true); }
});
(async ()=>{
  if(!location.hash.includes('id_token')) return;
  try{
    const f=await enoki(); await f.handleAuthCallback();
    const a=await addrFromFlow(f);
    history.replaceState(null,'',location.pathname);
    if(a) setSignedIn(a, false); else setSignedIn(REGISTRY, true);
  }catch(e){ console.warn('callback failed, demo fallback:', e); history.replaceState(null,'',location.pathname); setSignedIn(REGISTRY, true); }
})();
</script>
</body>
</html>
